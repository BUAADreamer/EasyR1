data:
  train_files: BUAADreamer/clevr_count_70k_local@train
  val_files: BUAADreamer/clevr_count_70k_local@test
  prompt_key: problem
  rollout_batch_size: 64
  max_prompt_length: 2048
  max_response_length: 2048
  shuffle: true
  seed: 1
  max_pixels: 4194304
  min_pixels: 262144

algorithm:
  adv_estimator: grpo
  kl_coef: 0.0

worker:
  actor:
    global_batch_size: 16
    micro_batch_size_per_device_for_update: 1
    micro_batch_size_per_device_for_experience: 2
    use_kl_loss: true
    kl_loss_coef: 1.0e-1
    kl_loss_type: low_var_kl
    model:
      model_path: /data/fengzc/LLM/checkpoints/Qwen2-VL-2B-Instruct
      enable_gradient_checkpointing: true
    optim:
      lr: 1.0e-6
      weight_decay: 1.0e-2
    fsdp:
      param_offload: false
      optimizer_offload: false
      torch_dtype: null
    offload:
      param_offload: true
      optimizer_offload: true

  rollout:
    temperature: 1.0
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.6
    n: 8
    enable_chunked_prefill: false

  ref:
    offload:
      param_offload: true

  reward:
    reward_type: function
    compute_score: r1v

trainer:
  total_episodes: 15
  logger: ["console", "wandb"]
  project_name: easy_r1
  experiment_name: qwen2_vl_2b_clevr
  n_gpus_per_node: 8
  nnodes: 1
  save_freq: 10
  test_freq: 1
  val_before_train: false
  val_only: false
  save_checkpoint_path: null
